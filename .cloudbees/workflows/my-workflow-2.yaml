apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow

on:
 workflow_dispatch:

jobs:
  build:
    steps:
      - name: Say hello
        id: spec_check
        uses: docker://golang:1.20.3-alpine3.17
        shell: sh
        run: |
          echo "hello world"
          echo "false" >> "$CLOUDBEES_OUTPUTS/spec_changed"
      
      - name: echo output
        uses: docker://golang:1.20.3-alpine3.17
        shell: sh
        run: |
          echo ${{ steps.spec_check.outputs.spec_changed }}

      - name: Check for existing open PR
        id: pr_check
        if: ${{ steps.spec_check.outputs.spec_changed }}
        uses: docker://alpine:3.19
        shell: sh
        run: |
          echo "Successfully executed"
